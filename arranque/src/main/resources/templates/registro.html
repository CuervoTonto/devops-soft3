<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTrack - Registro</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 500px; margin: 50px auto; background: white; padding: 40px; border-radius: 8px; }
    h1 { color: #333; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; color: #555; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .error { color: red; margin-top: 10px; display: none; }
    .success { color: green; margin-top: 10px; display: none; }
    .login-link { text-align: center; margin-top: 20px; }
    .login-link a { color: #007bff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Crear Cuenta</h1>
    <form id="registroForm">
      <div class="form-group">
        <label for="firstName">Nombre</label>
        <input type="text" id="firstName" name="firstName" required>
      </div>
      <div class="form-group">
        <label for="lastName">Apellido</label>
        <input type="text" id="lastName" name="lastName" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="passportNumber">Numero de Pasaporte</label>
        <input type="text" id="passportNumber" name="passportNumber" required>
      </div>
      <div class="form-group">
        <label for="password">Contrasena</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit">Registrarse</button>
      <div id="error" class="error"></div>
      <div id="success" class="success"></div>
    </form>
    <div class="login-link">
      <a href="/login">Ya tienes cuenta? Inicia sesion</a>
    </div>
  </div>

  <script>
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const passportNumber = document.getElementById('passportNumber').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      try {
        const response = await fetch('/api/auth/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, firstName, lastName, passportNumber })
        });
        
        if (response.ok) {
          const data = await response.json();
          document.cookie = 'token=' + data.token + '; path=/; SameSite=Lax';
          successDiv.textContent = 'Registro exitoso! Redirigiendo...';
          successDiv.style.display = 'block';
          setTimeout(() => window.location.href = '/itinerario', 1000);
        } else {
          const errorData = await response.json();
          errorDiv.textContent = errorData.message || 'Error al registrarse';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Error al registrarse';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
