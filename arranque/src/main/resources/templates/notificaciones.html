<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTrack - Notificaciones</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
    h1 { color: #333; }
    .nav { margin-bottom: 20px; }
    .nav a { margin-right: 15px; color: #007bff; text-decoration: none; }
    .notification { padding: 15px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 15px; }
    .notification h3 { margin: 0 0 10px 0; color: #333; }
    .notification p { margin: 0; color: #666; }
    .notification .date { font-size: 12px; color: #999; margin-top: 10px; }
    .no-data { color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">Inicio</a>
      <a href="/itinerario">Itinerario</a>
      <a href="/notificaciones">Notificaciones</a>
    </div>
    
    <h1>Mis Notificaciones</h1>
    <p th:if="${email != null}">Bienvenido: <strong th:text="${email}">email</strong></p>
    
    <div th:if="${notificaciones != null and not #lists.isEmpty(notificaciones)}">
      <div th:each="notif : ${notificaciones}" class="notification">
        <h3 th:text="${notif.titulo}">Cambio de vuelo</h3>
        <p th:text="${notif.mensaje}">Su vuelo ha sido reprogramado</p>
        <div class="date" th:text="${#temporals.format(notif.enviadoEn, 'dd/MM/yyyy HH:mm')}">01/01/2024 10:00</div>
      </div>
    </div>
    
    <div th:if="${notificaciones == null or #lists.isEmpty(notificaciones)}" class="no-data">
      <p>No tienes notificaciones.</p>
    </div>
  </div>
</body>
</html>
