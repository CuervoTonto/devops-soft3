server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        secure: false

logging:
  level:
    com.aerosmart: DEBUG

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: "org.postgresql.Driver"
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML

flytrack:
  jwt:
    cookie-name: token
    secret: ${JWT_SECRET:flytrack-secret-key-para-desarrollo-2024}
    expiration-ms: 86400000