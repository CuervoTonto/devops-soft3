<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTrack - Mi Itinerario</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.2);
    }
    .gradient-hero {
      background: linear-gradient(135deg, #0ea5e9 0%, #1e40af 100%);
    }
  </style>
</head>
<body class="bg-sky-50 min-h-screen">
  <nav class="glass-nav fixed top-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <span class="text-2xl font-bold text-sky-600">✈ FlyTrack</span>
        </div>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-slate-600 hover:text-sky-600 font-medium transition">Inicio</a>
          <a href="/itinerario" class="text-sky-700 hover:text-sky-900 font-medium transition">Mi Itinerario</a>
          <a href="/equipaje" class="text-slate-600 hover:text-sky-600 font-medium transition">Equipaje</a>
          <a href="/notificaciones" class="text-slate-600 hover:text-sky-600 font-medium transition">Notificaciones</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="gradient-hero pt-24 pb-16 px-4">
    <div class="max-w-7xl mx-auto text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Mis Itinerarios</h1>
      <p class="text-sky-100 text-lg" th:if="${email != null}">Bienvenido, <span th:text="${email}" class="font-semibold">email</span></p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8 -mt-4">
    <div th:if="${itinerarios != null and not #lists.isEmpty(itinerarios)}" class="space-y-4">
      <div th:each="itinerario : ${itinerarios}" class="bg-white rounded-2xl shadow-lg border border-sky-100 overflow-hidden hover:shadow-xl transition-shadow duration-300">
        <div class="flex flex-col md:flex-row">
          <div class="md:w-2/3 p-6">
            <div class="flex items-center gap-3 mb-4">
              <span class="text-2xl font-bold text-sky-600" th:text="${itinerario.numeroVuelo}">AA1234</span>
              <span class="px-3 py-1 rounded-full text-xs font-semibold"
                    th:classappend="${itinerario.estado == 'ON_TIME'} ? 'bg-green-100 text-green-700 border border-green-200' : (${itinerario.estado == 'DELAYED'} ? 'bg-amber-100 text-amber-700 border border-amber-200' : 'bg-red-100 text-red-700 border border-red-200')"
                    th:text="${itinerario.estado}">ON_TIME</span>
            </div>
            <div class="flex items-center gap-4 mb-4">
              <div class="text-center">
                <span class="text-2xl font-bold text-slate-800" th:text="${itinerario.origen}">BOG</span>
                <p class="text-xs text-slate-500" th:text="${#temporals.format(itinerario.horaSalida, 'HH:mm')}">10:00</p>
              </div>
              <div class="flex-1 flex items-center">
                <div class="flex-1 border-t-2 border-dashed border-slate-300 relative">
                  <span class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white px-2">
                    <svg class="w-6 h-6 text-sky-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
                  </span>
                </div>
              </div>
              <div class="text-center">
                <span class="text-2xl font-bold text-slate-800" th:text="${itinerario.destino}">JFK</span>
                <p class="text-xs text-slate-500" th:text="${#temporals.format(itinerario.horaLlegada, 'HH:mm')}">14:00</p>
              </div>
            </div>
            <p class="text-sm text-slate-500" th:text="${#temporals.format(itinerario.horaSalida, 'dd/MM/yyyy HH:mm')}">01/01/2024 10:00</p>
          </div>
          <div class="md:w-1/3 bg-sky-50 p-6 flex flex-col justify-center items-center border-l border-sky-100">
            <div class="text-center">
              <p class="text-sm text-slate-500 mb-1">Puerta</p>
              <span class="text-3xl font-bold text-sky-600" th:text="${itinerario.puerta}">A12</span>
            </div>
            <div class="mt-4 text-center">
              <p class="text-sm text-slate-500 mb-1">Asiento</p>
              <span class="text-2xl font-bold text-slate-700" th:text="${itinerario.asiento}">12A</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div th:if="${itinerarios == null or #lists.isEmpty(itinerarios)}" class="bg-white rounded-2xl shadow-lg border border-sky-100 p-12 text-center">
      <div th:if="${email == null}">
        <svg class="w-16 h-16 mx-auto text-slate-300 mb-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1z" clip-rule="evenodd"/><path d="M4 5h2a2 2 0 012 2v11a2 2 0 01-2 2H4a2 2 0 01-2-2V7a2 2 0 012-2zm2.5 7a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm2.45 4a2.5 2.5 0 10-4.9 0h4.9zM12 9a1 1 0 100 2h3a1 1 0 100-2h-3zm-1 4a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1z"/></svg>
        <p class="text-slate-500 text-lg mb-4">Inicia sesión para ver tus itinerarios.</p>
        <a href="/login" class="inline-block bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl">
          Iniciar sesión
        </a>
      </div>
      <div th:if="${email != null}">
        <svg class="w-16 h-16 mx-auto text-slate-300 mb-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
        <p class="text-slate-500 text-lg">No tienes itinerarios disponibles.</p>
        <a href="/" class="inline-block mt-4 text-sky-600 hover:text-sky-700 font-medium">
          Ver vuelos disponibles →
        </a>
      </div>
    </div>
  </div>
</body>
</html>
