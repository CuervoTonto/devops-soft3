<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTrack - Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #0ea5e9 0%, #1e40af 50%, #1e3a8a 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <a href="/" class="flex items-center text-white/80 hover:text-white transition mb-6">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
      Volver al inicio
    </a>

    <div class="glass-card rounded-2xl shadow-2xl p-8 animate-fade-in">
      <div class="text-center mb-6">
        <span class="text-4xl">✈</span>
        <h1 class="text-3xl font-bold text-slate-800 mt-2">FlyTrack</h1>
        <p class="text-slate-500 mt-2">Crea tu cuenta</p>
      </div>

      <form id="registroForm" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="firstName" class="block text-sm font-medium text-slate-700 mb-2">Nombre</label>
            <input type="text" id="firstName" name="firstName" required 
              class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none"
              placeholder="Juan">
          </div>
          <div>
            <label for="lastName" class="block text-sm font-medium text-slate-700 mb-2">Apellido</label>
            <input type="text" id="lastName" name="lastName" required 
              class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none"
              placeholder="Pérez">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
            </div>
            <input type="email" id="email" name="email" required 
              class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none"
              placeholder="tu@email.com">
          </div>
        </div>

        <div>
          <label for="passportNumber" class="block text-sm font-medium text-slate-700 mb-2">Número de Pasaporte</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1z" clip-rule="evenodd"/><path d="M4 5h2a2 2 0 012 2v11a2 2 0 01-2 2H4a2 2 0 01-2-2V7a2 2 0 012-2zm2.5 7a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm2.45 4a2.5 2.5 0 10-4.9 0h4.9zM12 9a1 1 0 100 2h3a1 1 0 100-2h-3zm-1 4a1 1 0 011-1h2a1 1 0 110 2h-2a1 1 0 01-1-1z"/></svg>
            </div>
            <input type="text" id="passportNumber" name="passportNumber" required 
              class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none"
              placeholder="AB1234567">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
            </div>
            <input type="password" id="password" name="password" required 
              class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none"
              placeholder="••••••••">
          </div>
        </div>

        <button type="submit" 
          class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
          Crear Cuenta
        </button>

        <div id="error" class="hidden p-4 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-red-600 text-sm flex items-center">
            <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            <span id="errorText"></span>
          </p>
        </div>

        <div id="success" class="hidden p-4 bg-green-50 border border-green-200 rounded-lg">
          <p class="text-green-600 text-sm flex items-center">
            <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            Registro exitoso! Redirigiendo...
          </p>
        </div>
      </form>

      <div class="mt-6 text-center">
        <p class="text-slate-500">
          Ya tienes cuenta?
          <a href="/login" class="text-sky-600 hover:text-sky-700 font-medium transition">
            Inicia sesión
          </a>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const passportNumber = document.getElementById('passportNumber').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const errorText = document.getElementById('errorText');
      const successDiv = document.getElementById('success');
      const btn = e.target.querySelector('button[type="submit"]');
      
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="inline-flex items-center"><svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Creando cuenta...</span>';
      
      try {
        const response = await fetch('/api/auth/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, firstName, lastName, passportNumber })
        });
        
        if (response.ok) {
          const data = await response.json();
          document.cookie = 'token=' + data.token + '; path=/; SameSite=Lax';
          successDiv.classList.remove('hidden');
          setTimeout(() => window.location.href = '/itinerario', 1500);
        } else {
          const errorData = await response.json();
          errorText.textContent = errorData.message || 'Error al registrarse';
          errorDiv.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Crear Cuenta';
        }
      } catch (err) {
        errorText.textContent = 'Error al registrarse';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Crear Cuenta';
      }
    });
  </script>
  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }
    function isLoggedIn() {
      return getCookie('token') !== null;
    }
    if (isLoggedIn()) {
      window.location.href = '/itinerario';
    }
  </script>
</body>
</html>
