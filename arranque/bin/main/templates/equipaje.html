<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTrack - Equipaje</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.2);
    }
    .gradient-hero {
      background: linear-gradient(135deg, #0ea5e9 0%, #1e40af 100%);
    }
  </style>
</head>
<body class="bg-sky-50 min-h-screen">
  <nav class="glass-nav fixed top-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <span class="text-2xl font-bold text-sky-600">✈ FlyTrack</span>
        </div>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-slate-600 hover:text-sky-600 font-medium transition">Inicio</a>
          <a href="/itinerario" class="text-slate-600 hover:text-sky-600 font-medium transition">Mi Itinerario</a>
          <a href="/equipaje" class="text-sky-700 hover:text-sky-900 font-medium transition">Equipaje</a>
          <a href="/notificaciones" class="text-slate-600 hover:text-sky-600 font-medium transition">Notificaciones</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="gradient-hero pt-24 pb-16 px-4">
    <div class="max-w-7xl mx-auto text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Gestión de Equipaje</h1>
      <p class="text-sky-100 text-lg">Reporta incidencias y seguimiento de tu equipaje</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8 -mt-4">
    <div class="bg-white rounded-2xl shadow-lg border border-sky-100 p-6 mb-6">
      <p class="text-slate-600">Bienvenido: <strong id="userEmail" class="text-sky-600">Cargando...</strong></p>
    </div>

    <button onclick="abrirFormularioVacio()" class="mb-6 bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl flex items-center gap-2">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
      Nuevo Reporte de Equipaje
    </button>

    <div id="loading" class="bg-white rounded-2xl shadow-lg border border-sky-100 p-12 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 border-4 border-sky-200 border-t-sky-500 rounded-full animate-spin"></div>
      <p class="mt-4 text-slate-500">Cargando reservas...</p>
    </div>

    <div id="error" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-red-600 flex items-center">
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span id="errorText"></span>
      </p>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div id="reservasSection" class="hidden">
        <div class="bg-sky-500 text-white px-6 py-4 rounded-t-2xl">
          <h2 class="text-lg font-semibold">Mis Reservas</h2>
        </div>
        <div id="reservasGrid" class="space-y-4">
        </div>
      </div>

      <div id="reportesSection" class="hidden">
        <div class="bg-amber-500 text-white px-6 py-4 rounded-t-2xl">
          <h2 class="text-lg font-semibold">Mis Reportes de Equipaje</h2>
        </div>
        <div id="reportesGrid" class="space-y-4">
        </div>
      </div>
    </div>

    <div id="formSection" class="hidden mt-6 bg-white rounded-2xl shadow-lg border border-sky-100 overflow-hidden">
      <div class="bg-sky-500 text-white px-6 py-4">
        <h2 class="text-lg font-semibold">Reportar Incidencia</h2>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Seleccionar Reserva:</label>
          <select id="bookingSelect" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none bg-white">
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Tipo de Incidencia:</label>
          <select id="tipoIncidencia" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none bg-white">
            <option value="LOST">🛑 Equipaje perdido</option>
            <option value="DAMAGED">💥 Equipaje dañado</option>
            <option value="DELAYED">⏰ Equipaje demorado</option>
            <option value="OTHER">📋 Otro</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Descripción:</label>
          <textarea id="descripcion" rows="4" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors outline-none resize-none" placeholder="Describe el problema con tu equipaje..."></textarea>
        </div>
        <div class="flex gap-3">
          <button onclick="reportarIncidencia()" class="bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl">
            Enviar Reporte
          </button>
          <button onclick="mostrarReservas()" class="bg-slate-500 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200">
            Cancelar
          </button>
        </div>
        <div id="formMessage"></div>
      </div>
    </div>
  </div>

  <script>
    let misReservas = [];
    let reportes = [];

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    }

    function isLoggedIn() {
      return getCookie('token') !== null;
    }

    async function loadItinerario() {
      try {
        const response = await fetch('/api/vuelos/itinerario');
        if (!response.ok) throw new Error('Error al cargar itinerario');
        const data = await response.json();
        return Array.isArray(data) ? data : data.itinerarios || [];
      } catch (e) {
        return [];
      }
    }

    async function loadReportes() {
      try {
        const response = await fetch('/api/equipaje/mis-reportes');
        if (!response.ok) throw new Error('Error al cargar reportes');
        return await response.json();
      } catch (e) {
        return [];
      }
    }

    async function init() {
      if (!isLoggedIn()) {
        window.location.href = '/login';
        return;
      }

      document.getElementById('userEmail').textContent = 'Usuario logueado';
      
      misReservas = await loadItinerario();
      reportes = await loadReportes();
      
      renderReservas();
      renderReportes();
      
      document.getElementById('loading').style.display = 'none';
      document.getElementById('reservasSection').style.display = 'block';
      document.getElementById('reportesSection').style.display = 'block';
    }

    function renderReservas() {
      const grid = document.getElementById('reservasGrid');
      grid.innerHTML = '';
      
      if (misReservas.length === 0) {
        grid.innerHTML = '<div class="bg-white rounded-b-2xl p-6 text-center text-slate-500 border border-t-0 border-slate-100">No tienes reservas.</div>';
        return;
      }
      
      misReservas.forEach(r => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-b-2xl p-4 border border-t-0 border-slate-100 hover:bg-sky-50 transition-colors duration-150';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <div>
              <span class="font-semibold text-sky-600">${r.referenciaReserva}</span>
              <p class="text-sm text-slate-500">${r.numeroVuelo}</p>
            </div>
            <span class="text-sm text-slate-400">${new Date(r.horaSalida).toLocaleDateString()}</span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-slate-700 font-medium">${r.origen} → ${r.destino}</span>
            <button onclick="abrirFormulario('${r.referenciaReserva}')" class="text-sky-600 hover:text-sky-700 font-medium text-sm bg-sky-100 hover:bg-sky-200 px-3 py-1 rounded transition-colors">
              Reportar
            </button>
          </div>
        `;
        grid.appendChild(card);
      });

      const select = document.getElementById('bookingSelect');
      select.innerHTML = misReservas.map(r => 
        `<option value="${r.referenciaReserva}">${r.referenciaReserva} - ${r.numeroVuelo} (${r.origen} → ${r.destino})</option>`
      ).join('');
    }

    function renderReportes() {
      const grid = document.getElementById('reportesGrid');
      grid.innerHTML = '';
      
      if (reportes.length === 0) {
        grid.innerHTML = '<div class="bg-white rounded-b-2xl p-6 text-center text-slate-500 border border-t-0 border-slate-100">No tienes reportes.</div>';
        return;
      }
      
      const tipoIcons = {
        'LOST': '🛑',
        'DAMAGED': '💥',
        'DELAYED': '⏰',
        'OTHER': '📋'
      };
      
      reportes.forEach(r => {
        const statusClass = r.estado === 'OPEN' ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-green-100 text-green-700 border-green-200';
        const card = document.createElement('div');
        card.className = 'bg-white rounded-b-2xl p-4 border border-t-0 border-slate-100 hover:bg-amber-50 transition-colors duration-150';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <div class="flex items-center gap-2">
              <span class="text-lg">${tipoIcons[r.tipoIncidencia] || '📋'}</span>
              <div>
                <span class="font-semibold text-amber-600">${r.referenciaReserva}</span>
                <p class="text-sm text-slate-500">${r.numeroVuelo}</p>
              </div>
            </div>
            <span class="px-3 py-1 rounded-full text-xs font-semibold border ${statusClass}">${r.estado}</span>
          </div>
          <p class="text-slate-600 text-sm mb-2">${r.descripcion}</p>
          <p class="text-xs text-slate-400">${new Date(r.reportadoEn).toLocaleString()}</p>
        `;
        grid.appendChild(card);
      });
    }

    function abrirFormulario(referencia) {
      document.getElementById('reservasSection').style.display = 'none';
      document.getElementById('reportesSection').style.display = 'none';
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('bookingSelect').value = referencia;
      document.getElementById('formMessage').style.display = 'none';
    }

    function abrirFormularioVacio() {
      if (misReservas.length === 0) {
        alert('No tienes reservas para reportar.');
        return;
      }
      document.getElementById('reservasSection').style.display = 'none';
      document.getElementById('reportesSection').style.display = 'none';
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('bookingSelect').value = misReservas[0].referenciaReserva;
      document.getElementById('formMessage').style.display = 'none';
    }

    function mostrarReservas() {
      document.getElementById('reservasSection').style.display = 'block';
      document.getElementById('reportesSection').style.display = 'block';
      document.getElementById('formSection').style.display = 'none';
    }

    async function reportarIncidencia() {
      const referencia = document.getElementById('bookingSelect').value;
      const tipo = document.getElementById('tipoIncidencia').value;
      const descripcion = document.getElementById('descripcion').value;
      const msgDiv = document.getElementById('formMessage');
      
      if (!descripcion.trim()) {
        msgDiv.className = 'p-4 bg-red-50 border border-red-200 rounded-lg text-red-600';
        msgDiv.textContent = 'Por favor describe el problema';
        msgDiv.style.display = 'block';
        return;
      }

      const reserva = misReservas.find(r => r.referenciaReserva === referencia);
      if (!reserva) {
        msgDiv.className = 'p-4 bg-red-50 border border-red-200 rounded-lg text-red-600';
        msgDiv.textContent = 'Reserva no encontrada';
        msgDiv.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/api/equipaje/reportar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            bookingId: reserva.referenciaReserva,
            tipoIncidencia: tipo,
            descripcion: descripcion
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.message || 'Error al crear reporte');
        }

        const reporte = await response.json();
        reportes.unshift(reporte);
        
        msgDiv.className = 'p-4 bg-green-50 border border-green-200 rounded-lg text-green-600';
        msgDiv.innerHTML = '<strong>✓ Reporte enviado exitosamente!</strong>';
        msgDiv.style.display = 'block';
        
        document.getElementById('descripcion').value = '';
        
        setTimeout(() => {
          mostrarReservas();
          renderReportes();
        }, 2000);
        
      } catch (err) {
        msgDiv.className = 'p-4 bg-red-50 border border-red-200 rounded-lg text-red-600';
        msgDiv.textContent = err.message;
        msgDiv.style.display = 'block';
      }
    }

    init();
  </script>
</body>
</html>
