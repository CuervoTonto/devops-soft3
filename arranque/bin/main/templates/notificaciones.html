<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTrack - Notificaciones</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.2);
    }
    .gradient-hero {
      background: linear-gradient(135deg, #0ea5e9 0%, #1e40af 100%);
    }
  </style>
</head>
<body class="bg-sky-50 min-h-screen">
  <nav class="glass-nav fixed top-0 w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <span class="text-2xl font-bold text-sky-600">✈ FlyTrack</span>
        </div>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-slate-600 hover:text-sky-600 font-medium transition">Inicio</a>
          <a href="/itinerario" class="text-slate-600 hover:text-sky-600 font-medium transition">Mi Itinerario</a>
          <a href="/equipaje" class="text-slate-600 hover:text-sky-600 font-medium transition">Equipaje</a>
          <a href="/notificaciones" class="text-sky-700 hover:text-sky-900 font-medium transition">Notificaciones</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="gradient-hero pt-24 pb-16 px-4">
    <div class="max-w-7xl mx-auto text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Mis Notificaciones</h1>
      <p class="text-sky-100 text-lg" th:if="${email != null}">Bienvenido, <span th:text="${email}" class="font-semibold">email</span></p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8 -mt-4">
    <div th:if="${notificaciones != null and not #lists.isEmpty(notificaciones)}" class="space-y-4">
      <div th:each="notif : ${notificaciones}" class="bg-white rounded-2xl shadow-lg border border-sky-100 p-6 hover:shadow-xl transition-shadow duration-300">
        <div class="flex items-start gap-4">
          <div class="flex-shrink-0 w-12 h-12 bg-sky-100 rounded-full flex items-center justify-center">
            <svg class="w-6 h-6 text-sky-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
          </div>
          <div class="flex-1">
            <h3 th:text="${notif.titulo}" class="text-lg font-semibold text-slate-800 mb-2">Cambio de vuelo</h3>
            <p th:text="${notif.mensaje}" class="text-slate-600">Su vuelo ha sido reprogramado</p>
            <div class="mt-3 flex items-center text-sm text-slate-400">
              <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
              <span th:text="${#temporals.format(notif.enviadoEn, 'dd/MM/yyyy HH:mm')}">01/01/2024 10:00</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div th:if="${notificaciones == null or #lists.isEmpty(notificaciones)}" class="bg-white rounded-2xl shadow-lg border border-sky-100 p-12 text-center">
      <svg class="w-20 h-20 mx-auto text-slate-200 mb-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
      <p class="text-slate-500 text-lg">No tienes notificaciones.</p>
    </div>
  </div>
</body>
</html>
